name: trace-cloud
region: nyc

services:
  - name: trace-apps-cloud
    github:
      repo: Subham12R/Trace
      branch: main
      deploy_on_push: true
    # Source dir is repo root so the workspace package-lock.json is available
    source_dir: /
    build_command: npm ci && npm run build --workspace=apps/cloud
    run_command: node apps/cloud/dist/index.js
    environment_slug: node-js
    http_port: 3001
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: PORT
        value: "3001"
        scope: RUN_AND_BUILD_TIME
      - key: BETTER_AUTH_URL
        value: https://cloud.trace.app
        scope: RUN_TIME
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: BETTER_AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
