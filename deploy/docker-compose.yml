services:
  app:
    build:
      context: ../apps/cloud
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped
